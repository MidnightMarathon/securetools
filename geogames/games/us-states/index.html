<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>U.S. States Quiz | SecureTools GeoGames</title>
  <meta name="description" content="Practice U.S. geography with a private browser-based map quiz. No tracking, no signup.">
  <link rel="icon" href="/assets/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="stylesheet" href="/assets/styles.css?v=20260530e">
  <link rel="stylesheet" href="styles.css">
  <script src="/assets/tool-switcher.js?v=20260530e" defer></script>
</head>
<body>
  <nav>
    <a href="/" aria-label="SecureTools Home">Home</a>
    <a href="/about.html" aria-label="About SecureTools">About</a>
  </nav>

  <main id="game-container">
    <div id="top-info-bar">
      <div id="title-instructions">
        <h1>U.S. States Quiz</h1>
        <span class="instruction">Click the correct state on the map.</span>
      </div>
      <div id="target-container">
        <span>Find:</span> <strong id="target-state">Loading...</strong>
      </div>
      <div id="score-container">
          Score: <span id="score">0</span> / <span id="total-states">0</span> (<span id="percentage">0%</span>)
      </div>
    </div>

    <div id="map-container" class="map-container">
      <!-- SVG map will be loaded here -->
    </div>
  </main>
  <script src="/geogames/games/us-states/script.js" defer></script>
</body>
</html>
