name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      options:
        - QR Code Generator
        - Password Generator
        - UUID Generator
        - Random Number Generator
        - Favicon Generator
        - Base64 Encoder / Decoder
        - URL Encoder / Decoder
        - US States Map Quiz
        - Gaussian Elimination
        - Home page (index.html)
        - Other / multiple
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated difficulty
      description: Your best guess — maintainers may adjust this.
      options:
        - "Easy — good first issue"
        - "Medium — requires some context"
        - "Hard — complex or cross-cutting"
        - "Not sure"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen vs. what actually happened?
      placeholder: "When I click Generate, nothing happens — I expected a QR code to appear."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal set of steps that reliably triggers the bug.
      placeholder: |
        1. Open /qr-code-generator/
        2. Type a URL into the input
        3. Click Generate
        4. ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 124, Firefox 125, Safari 17..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 14, Ubuntu 22.04, iOS 17..."
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open DevTools (F12 → Console) and paste any red error messages here.
      render: text
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know the bug is fixed? Leave blank if obvious from the description.
      placeholder: |
        - The QR code should render within 1 second of clicking Generate
        - No errors should appear in the browser console
    validations:
      required: false
