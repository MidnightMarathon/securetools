name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      options:
        - QR Code Generator
        - Password Generator
        - UUID Generator
        - Random Number Generator
        - Favicon Generator
        - Base64 Encoder / Decoder
        - URL Encoder / Decoder
        - US States Map Quiz
        - Gaussian Elimination
        - Home page (index.html)
        - Other / multiple
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated difficulty
      description: Your best guess — maintainers may adjust this.
      options:
        - "Easy — good first issue"
        - "Medium — requires some context"
        - "Hard — complex or cross-cutting"
        - "Not sure"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen vs. what actually happened?
      placeholder: "When I click Generate, nothing happens — I expected a QR code to appear."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal set of steps that reliably triggers the bug.
      placeholder: |
        1. Open /qr-code-generator/
        2. Type a URL into the input
        3. Click Generate
        4. ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 124, Firefox 125, Safari 17..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 14, Ubuntu 22.04, iOS 17..."
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open DevTools (F12 → Console) and paste any red error messages here.
      render: text
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Strict Acceptance Criteria for AI Agents & Humans
      description: How will we know the bug is fixed? What explicit requirements must be met before closing this issue?
      value: |
        ### 🤖 Agent Verification Checklist:
        - [ ] **NO FRAMEWORKS:** The bug fix MUST NOT introduce React, Vue, Tailwind, Node.js, `package.json`, or a build step.
        - [ ] **NO INLINE JS:** The fix MUST NOT add `<script>` tags without `defer` or inline event handlers like `onclick` into the HTML files.
        - [ ] **SRI SECURED:** Any modified or new CDN scripts MUST include valid SRI `integrity` and `crossorigin="anonymous"` attributes.
        - [ ] **CI TESTED:** The fix handles any `html-validate` errors cleanly without triggering new pipeline failures.
        - [ ] **SECURE CRYPTO:** The fix does NOT use `Math.random()`.

        ### 🐛 Fix-Specific Requirements:
        - [ ] The reported bug no longer occurs when following the reproduction steps.
        - [ ] No new errors appear in the browser console.
        - [ ] [Requirement 1]
    validations:
      required: true
