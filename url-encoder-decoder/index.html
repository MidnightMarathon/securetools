<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Encoder &amp; Decoder – SecureTools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Encode or decode URLs securely in your browser with SecureTools. No tracking, no data sent to a server.">
  <link rel="icon" href="/assets/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <nav>
    <a href="/" aria-label="SecureTools Home">Home</a>
    <a href="/about.html" aria-label="About SecureTools">About</a>
  </nav>

  <main>
    <h1>URL Encoder &amp; Decoder</h1>
    <p>Convert text to or from percent-encoded format (UTF-8 safe). All processing happens securely in your browser.</p>

    <label for="input">Input:</label>
    <textarea id="input" placeholder="Enter URL or text to encode/decode..."></textarea>
    <div class="char-count">Characters: <span id="inputCount">0</span></div>

    <div class="btn-row">
      <button id="encode-btn" type="button">Encode</button>
      <button id="decode-btn" type="button">Decode</button>
    </div>

    <label for="output">Output:</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    <div class="char-count">Characters: <span id="outputCount">0</span></div>

    <button id="copy-btn" type="button">Copy Output</button>

    <div id="error" class="error"></div>
    <div id="copied" class="copy-note" aria-live="assertive" style="display:none;">Copied to clipboard!</div>
  </main>

  <script src="/url-encoder-decoder/script.js" defer></script>
</body>
</html>
