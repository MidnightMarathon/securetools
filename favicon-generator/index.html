<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Favicon Generator — SecureTools</title>
  <meta name="description" content="Generate favicons in all standard sizes from any image, entirely in your browser. No upload, no tracking." />
  <link rel="icon" href="/assets/favicon-32x32.png" sizes="32x32" type="image/png" />
  <!-- Global site-wide styles -->
  <link rel="stylesheet" href="/assets/styles.css" />
  <!-- Local overrides for favicon-generator -->
  <link rel="stylesheet" href="/favicon-generator/styles.css" />
  <!--
    canvas-to-ico is used to generate the .ico file.
    NOTE: This package is not currently available on jsDelivr or unpkg.
    If you know a working CDN URL with a valid SRI hash, update the src and
    integrity attributes below. Otherwise, consider bundling the file locally
    under /favicon-generator/canvas-to-ico.min.js and loading it from there.

    <script
      src="https://..."
      integrity="sha384-REPLACE_WITH_REAL_HASH"
      crossorigin="anonymous"
      defer
    ></script>
  -->
  <script src="/favicon-generator/script.js" defer></script>
</head>
<body>
  <nav>
    <a href="/" aria-label="SecureTools Home">Home</a>
    <a href="/about.html" aria-label="About SecureTools">About</a>
  </nav>

  <main>

    <header>
      <h1 class="tool-name">Favicon Generator</h1>
      <p class="tool-desc">
        Upload any image and generate favicons in all popular sizes, plus a favicon.ico file.
      </p>
    </header>

    <section class="input-group" style="align-items: flex-start; width: 100%;">
      <label for="upload" style="font-weight: 600; font-size: 1rem; cursor: pointer;">
        Select an image file:
      </label>
      <input id="upload" type="file" accept="image/*" style="margin-top: 0.5rem; width: 100%;" />
      <div id="file-info" aria-live="polite" style="font-style: italic; color: #666; margin-top: 0.3rem;"></div>
      <button id="clear" type="button" disabled>Clear</button>
    </section>

    <section id="preview" aria-live="polite" aria-label="Image preview"></section>

    <section id="downloads" aria-live="polite" aria-label="Download links"></section>

  </main>
</body>
</html>
